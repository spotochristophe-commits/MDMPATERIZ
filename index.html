<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion &mdash; Moulin des Moines</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--terra:#C87864;--brown:#78503C;--cream:#FDF5EE;--gold:#D2B469;--green:#1A5C2E;--white:#fff;--shadow:rgba(120,80,60,0.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Outfit",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);padding:30px 16px}
.wrap{width:100%;max-width:420px}
.logo-block{text-align:center;margin-bottom:28px}
.logo-icon{width:68px;height:68px;background:var(--brown);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px}
.logo-title{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:700;color:var(--brown)}
.logo-title span{color:var(--terra)}
.logo-sub{font-size:12px;color:#a08070;margin-top:3px}
.card{background:var(--white);border-radius:16px;padding:36px 32px;box-shadow:0 8px 40px var(--shadow);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--terra),var(--gold),var(--brown))}
.card-title{font-size:13px;font-weight:600;color:var(--brown);margin-bottom:22px;text-align:center;opacity:.8}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.iw{position:relative}
.iw .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.45;pointer-events:none}
.fg input{width:100%;padding:11px 13px 11px 40px;border:1.5px solid #e0d0c4;border-radius:8px;font-family:"Outfit",sans-serif;font-size:14px;background:var(--cream);color:#3a2a20;outline:none;transition:all .18s}
.fg input:focus{border-color:var(--terra);background:#fff;box-shadow:0 0 0 3px rgba(200,120,100,.12)}
.fg input::placeholder{color:#c0a898;font-size:13px}
.tpw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;opacity:.4;padding:4px}
.tpw:hover{opacity:.8}
.btn{width:100%;padding:13px;background:var(--brown);color:var(--white);border:none;border-radius:8px;font-family:"Outfit",sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:all .18s}
.btn:hover{background:var(--terra)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.sp{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#fdecea;color:#c62828;border:1px solid #ef9a9a;border-radius:8px;padding:11px 14px;font-size:13px;margin-top:14px;display:none;text-align:center}
.foot{text-align:center;margin-top:16px;font-size:12px;color:#b0988a}
.foot a{color:var(--terra);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-block">
    <div class="logo-icon">&#127806;</div>
    <div class="logo-title">Moulin <span>des</span> Moines</div>
    <div class="logo-sub">Espace Commandes 2026</div>
  </div>
  <div class="card">
    <div class="card-title">Identifiez-vous pour acc&#233;der au bon de commande</div>
    <div class="fg">
      <label>Email</label>
      <div class="iw"><span class="ic">&#64;</span>
        <input type="email" id="email" placeholder="votre@email.fr" autocomplete="email">
      </div>
    </div>
    <div class="fg">
      <label>Mot de passe</label>
      <div class="iw"><span class="ic">&#128274;</span>
        <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
        <button class="tpw" id="tpw-btn" tabindex="-1">&#128065;</button>
      </div>
    </div>
    <button class="btn" id="btn-login">
      <span class="sp" id="sp"></span>
      <span id="btn-lbl">Se connecter</span>
    </button>
    <div class="err" id="err"></div>
  </div>
  <div class="foot" style="margin-top:14px">Nouveau commercial ? <a href="inscription.html">Faire une demande d&#8217;acc&#232;s</a></div>
  <div class="foot" style="margin-top:6px">Moulin des Moines &copy; 2026</div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyB000QDa4c-vMjO1Xuimw58iiRvwgbF1zc",authDomain:"mdm-bdc26.firebaseapp.com",projectId:"mdm-bdc26",storageBucket:"mdm-bdc26.firebasestorage.app",messagingSenderId:"52658530893",appId:"1:52658530893:web:166626ae4d681465ddca04"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);

// Rediriger si deja connecte
onAuthStateChanged(auth,async(user)=>{
  if(!user)return;
  try{
    const s=await getDoc(doc(db,"users",user.uid));
    if(s.exists()){window.location.href=s.data().role==="admin"?"admin.html":"commande.html";}
  }catch(e){}
});

document.getElementById("btn-login").addEventListener("click",login);
document.getElementById("password").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
document.getElementById("email").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
document.getElementById("tpw-btn").addEventListener("click",()=>{
  const i=document.getElementById("password");i.type=i.type==="password"?"text":"password";
});

async function login(){
  const email=document.getElementById("email").value.trim();
  const pw=document.getElementById("password").value;
  const errEl=document.getElementById("err");
  const btn=document.getElementById("btn-login");
  const sp=document.getElementById("sp");
  const lbl=document.getElementById("btn-lbl");
  errEl.style.display="none";
  if(!email||!pw){showErr("Veuillez remplir tous les champs.");return;}
  btn.disabled=true;sp.style.display="inline-block";lbl.textContent="V\u00e9rification...";
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pw);
    const s=await getDoc(doc(db,"users",cred.user.uid));
    if(!s.exists())throw new Error("Compte non configur\u00e9. Contactez l'administrateur.");
    lbl.textContent="Connexion...";
    window.location.href=s.data().role==="admin"?"admin.html":"commande.html";
  }catch(e){
    btn.disabled=false;sp.style.display="none";lbl.textContent="Se connecter";
    const codes={"auth/invalid-credential":1,"auth/wrong-password":1,"auth/user-not-found":1};
    showErr(codes[e.code]?"Email ou mot de passe incorrect.":e.code==="auth/too-many-requests"?"Trop de tentatives. R\u00e9essayez plus tard.":e.message||"Erreur de connexion.");
  }
}
function showErr(m){const e=document.getElementById("err");e.textContent=m;e.style.display="block";}
</script>
</body>
</html>
